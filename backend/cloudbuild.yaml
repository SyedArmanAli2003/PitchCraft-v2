# Google Cloud Build → Cloud Run deployment for the PitchCraft backend.
#
#   gcloud builds submit --config backend/cloudbuild.yaml backend
#
# Set runtime secrets/env on the service (do NOT bake them into the image):
#   gcloud run services update pitchcraft-backend --region=us-central1 \
#     --set-env-vars MONGODB_URI=...,GEMINI_API_KEY_1=...,PHOENIX_API_KEY=...
# (or wire them through Secret Manager with --set-secrets).

steps:
  # 1. Build the container image.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/pitch-craft-api', '.']

  # 2. Push it to Container Registry.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pitch-craft-api']

  # 3. Deploy to Cloud Run (us-central1).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pitch-craft-api
      - --image=gcr.io/$PROJECT_ID/pitch-craft-api
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=10
      - --memory=1Gi
      - --cpu=1
      - --timeout=300
      - --port=8080

images:
  - 'gcr.io/$PROJECT_ID/pitch-craft-api'

options:
  logging: CLOUD_LOGGING_ONLY
